<svg width="1000" height="400" viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">

  <rect width="100%" height="100%" fill="black"/>

  <!-- GLOW -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)">

    <!-- CENTER PARTICLES -->

    <circle cx="500" cy="120" r="3" fill="#ffffff">
      <animate attributeName="cx" values="500;510;500" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="120;115;120" dur="3s" repeatCount="indefinite"/>
    </circle>

    <circle cx="470" cy="150" r="2.5" fill="#88ccff">
      <animate attributeName="cx" values="470;478;470" dur="5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="530" cy="150" r="2.5" fill="#88ccff">
      <animate attributeName="cx" values="530;522;530" dur="5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="450" cy="190" r="2" fill="#66aaff">
      <animate attributeName="cy" values="190;200;190" dur="4s" repeatCount="indefinite"/>
    </circle>

    <circle cx="550" cy="190" r="2" fill="#66aaff">
      <animate attributeName="cy" values="190;180;190" dur="4s" repeatCount="indefinite"/>
    </circle>

    <circle cx="500" cy="220" r="3" fill="#ffffff">
      <animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite"/>
    </circle>

    <circle cx="480" cy="250" r="2" fill="#88ccff">
      <animate attributeName="cx" values="480;490;480" dur="6s" repeatCount="indefinite"/>
    </circle>

    <circle cx="520" cy="250" r="2" fill="#88ccff">
      <animate attributeName="cx" values="520;510;520" dur="6s" repeatCount="indefinite"/>
    </circle>

    <!-- EXTRA FLOATING PARTICLES -->

    <circle cx="420" cy="120" r="1.5" fill="#ffffff">
      <animate attributeName="cy" values="120;100;120" dur="5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="580" cy="120" r="1.5" fill="#ffffff">
      <animate attributeName="cy" values="120;140;120" dur="5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="400" cy="200" r="1.5" fill="#66aaff">
      <animate attributeName="cx" values="400;415;400" dur="4s" repeatCount="indefinite"/>
    </circle>

    <circle cx="600" cy="200" r="1.5" fill="#66aaff">
      <animate attributeName="cx" values="600;585;600" dur="4s" repeatCount="indefinite"/>
    </circle>

    <circle cx="430" cy="260" r="1.5" fill="#88ccff">
      <animate attributeName="cy" values="260;250;260" dur="5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="570" cy="260" r="1.5" fill="#88ccff">
      <animate attributeName="cy" values="260;270;260" dur="5s" repeatCount="indefinite"/>
    </circle>

  </g>

</svg>